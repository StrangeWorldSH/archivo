<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarga de Archivos</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; border: 1px solid #ddd; }
        .btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #238636; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .btn:hover { background: #2ea043; }
        #info { margin-top: 10px; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="nombre-archivo">Cargando archivo...</h2>
    <div id="info">
        <p id="peso">Calculando tamaño...</p>
    </div>
    <a id="enlace-descarga" href="#" class="btn" style="display:none;">Descargar archivo</a>
</div>

<script>
    // CONFIGURACIÓN: Cambia estos datos por los tuyos
    const USUARIO = "TU_USUARIO_DE_GITHUB";
    const REPO = "NOMBRE_DE_TU_REPOSITORIO";
    const ARCHIVO = "Archivos.zip";

    async function obtenerDatos() {
        const url = `https://github.com{USUARIO}/${REPO}/contents/${ARCHIVO}`;
        
        try {
            const respuesta = await fetch(url);
            const datos = await respuesta.json();

            if (datos.size) {
                // Convertir bytes a MB
                const pesoMB = (datos.size / (1024 * 1024)).toFixed(2);
                
                document.getElementById('nombre-archivo').innerText = datos.name;
                document.getElementById('peso').innerText = `Peso: ${pesoMB} MB`;
                
                const link = document.getElementById('enlace-descarga');
                link.href = datos.download_url;
                link.style.display = 'inline-block';
            }
        } catch (error) {
            console.error("Error al obtener el archivo:", error);
            document.getElementById('nombre-archivo').innerText = "Archivo no encontrado";
        }
    }

    obtenerDatos();
</script>

</body>
</html>
